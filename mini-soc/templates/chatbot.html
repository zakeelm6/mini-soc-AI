{% extends "base.html" %}
{% block title %}SOC Bot{% endblock %}
{% block content %}
<style>
/* ── PAGE BOT ─────────────────────────────────────────────────────── */
.bot-page-layout {
  display: flex; gap: 16px;
  height: calc(100vh - 48px - 20px - 20px);  /* topbar + padding */
  min-height: 0;
}

/* ── SIDEBAR CONTEXTE ─────────────────────────────────────────────── */
.bot-ctx-panel {
  width: 240px; flex-shrink: 0;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  display: flex; flex-direction: column; overflow: hidden;
}
.bot-ctx-header {
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  font-size: 0.67rem; font-weight: 700; color: var(--green);
  text-transform: uppercase; letter-spacing: 1.5px;
  font-family: 'JetBrains Mono', monospace;
  display: flex; align-items: center; gap: 7px;
}
.bot-ctx-body { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
.ctx-stat {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 7px;
  padding: 10px 12px; display: flex; align-items: center; gap: 10px;
}
.ctx-stat-icon {
  width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 0.72rem;
}
.ctx-stat-val { font-size: 1.2rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; line-height: 1; }
.ctx-stat-lbl { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 2px; }

.bot-ctx-presets { padding: 10px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 5px; }
.preset-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 2px; font-family: 'JetBrains Mono', monospace; }
.preset-btn {
  width: 100%; text-align: left; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; padding: 7px 10px; font-size: 0.71rem; color: var(--text); cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  font-family: 'Space Grotesk', sans-serif;
  display: flex; align-items: center; gap: 7px;
}
.preset-btn:hover { border-color: var(--green); color: var(--green); background: rgba(159,239,0,0.04); }
.preset-btn i { width: 14px; text-align: center; font-size: 0.68rem; flex-shrink: 0; }

/* ── ZONE CHAT ────────────────────────────────────────────────────── */
.bot-chat-panel {
  flex: 1; min-width: 0;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  display: flex; flex-direction: column; overflow: hidden;
}
.bot-chat-header {
  padding: 12px 18px; border-bottom: 1px solid var(--border);
  background: var(--bg3); flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}
.bot-avatar-full {
  width: 38px; height: 38px; border-radius: 9px; flex-shrink: 0;
  background: linear-gradient(135deg, #1E2B3C, #111927);
  border: 1px solid var(--border); display: flex; align-items: center;
  justify-content: center; position: relative;
}
.bot-avatar-full .eye { width: 6px; height: 6px; border-radius: 50%; background: var(--green); position: absolute; }
.bot-avatar-full .eye-l { top: 10px; left: 8px; }
.bot-avatar-full .eye-r { top: 10px; right: 8px; }
.bot-avatar-full .mouth {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  width: 14px; height: 6px; border-radius: 0 0 7px 7px;
  border: 1.5px solid var(--green); border-top: none;
}
.bot-status-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--green);
  box-shadow: 0 0 6px var(--green); animation: pulse 1.5s infinite;
}
#page-bot-messages {
  flex: 1; overflow-y: auto; padding: 20px 24px;
  display: flex; flex-direction: column; gap: 12px;
}
.pmsg-row { display: flex; gap: 10px; align-items: flex-start; max-width: 75%; }
.pmsg-row.user { align-self: flex-end; flex-direction: row-reverse; }
.pmsg-row.bot  { align-self: flex-start; }
.pmsg-avatar {
  width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; margin-top: 2px;
  background: var(--bg3); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center; font-size: 0.8rem;
}
.pmsg-bubble {
  padding: 10px 14px; border-radius: 4px 12px 12px 12px;
  font-size: 0.78rem; line-height: 1.55; word-break: break-word;
}
.pmsg-row.bot .pmsg-bubble {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
  border-radius: 4px 12px 12px 12px;
}
.pmsg-row.user .pmsg-bubble {
  background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.25);
  color: var(--text2); border-radius: 12px 4px 12px 12px;
}
.pmsg-row.alert .pmsg-bubble {
  background: rgba(255,71,87,0.06); border: 1px solid rgba(255,71,87,0.3);
  color: var(--text2); border-radius: 4px 12px 12px 12px;
}
.pmsg-ts { font-size: 0.6rem; color: var(--muted); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }

.bot-chat-input-area {
  border-top: 1px solid var(--border); padding: 12px 18px;
  display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
  background: var(--bg);
}
#page-bot-input {
  flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text2); font-size: 0.8rem; padding: 10px 14px; outline: none;
  resize: none; font-family: 'Space Grotesk', sans-serif; line-height: 1.5;
  min-height: 42px; max-height: 120px; transition: border-color 0.2s;
}
#page-bot-input:focus { border-color: var(--green); box-shadow: 0 0 0 2px rgba(159,239,0,0.08); }
#page-bot-input::placeholder { color: var(--muted); }
#page-bot-send {
  width: 42px; height: 42px; border-radius: 8px; border: none;
  background: var(--green); color: #111927; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 0.9rem;
  flex-shrink: 0; transition: background 0.15s, transform 0.1s;
}
#page-bot-send:hover  { background: #b5f533; }
#page-bot-send:active { transform: scale(0.93); }
#page-bot-send:disabled { background: var(--bg3); color: var(--muted); cursor: not-allowed; }

.typing-dots { display: flex; gap: 4px; align-items: center; padding: 3px 2px; }
.typing-dots span {
  width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
  animation: botDot 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes botDot { 0%,80%,100%{transform:scale(0.7);opacity:0.4;} 40%{transform:scale(1);opacity:1;} }

.clear-btn {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  color: var(--muted); font-size: 0.68rem; padding: 5px 10px; cursor: pointer;
  transition: color 0.15s, border-color 0.15s; display: flex; align-items: center; gap: 5px;
}
.clear-btn:hover { color: var(--red); border-color: var(--red); }
</style>

<div class="bot-page-layout">

  <!-- ── PANEL CONTEXTE SOC ── -->
  <div class="bot-ctx-panel">
    <div class="bot-ctx-header">
      <i class="fas fa-satellite-dish" style="color:var(--green);"></i>
      Contexte SOC
    </div>
    <div class="bot-ctx-body">
      <div class="ctx-stat">
        <div class="ctx-stat-icon" style="background:rgba(255,71,87,0.1);color:var(--red);border:1px solid rgba(255,71,87,0.25);">
          <i class="fas fa-fire"></i>
        </div>
        <div>
          <div class="ctx-stat-val" id="ctx-open" style="color:var(--red);">—</div>
          <div class="ctx-stat-lbl">Incidents ouverts</div>
        </div>
      </div>
      <div class="ctx-stat">
        <div class="ctx-stat-icon" style="background:rgba(255,107,53,0.1);color:var(--orange);border:1px solid rgba(255,107,53,0.25);">
          <i class="fas fa-skull-crossbones"></i>
        </div>
        <div>
          <div class="ctx-stat-val" id="ctx-critical" style="color:var(--orange);">—</div>
          <div class="ctx-stat-lbl">Critiques en attente</div>
        </div>
      </div>
      <div class="ctx-stat">
        <div class="ctx-stat-icon" style="background:rgba(167,139,250,0.1);color:var(--purple);border:1px solid rgba(167,139,250,0.25);">
          <i class="fas fa-robot"></i>
        </div>
        <div>
          <div class="ctx-stat-val" id="ctx-anomalies" style="color:var(--purple);">—</div>
          <div class="ctx-stat-lbl">Anomalies 24h</div>
        </div>
      </div>
      <div class="ctx-stat">
        <div class="ctx-stat-icon" style="background:rgba(0,217,255,0.08);color:var(--cyan);border:1px solid rgba(0,217,255,0.25);">
          <i class="fas fa-shield-virus"></i>
        </div>
        <div>
          <div class="ctx-stat-val" id="ctx-pe" style="color:var(--cyan);">—</div>
          <div class="ctx-stat-lbl">Post-exploit 24h</div>
        </div>
      </div>
      <div class="ctx-stat">
        <div class="ctx-stat-icon" style="background:rgba(159,239,0,0.08);color:var(--green);border:1px solid rgba(159,239,0,0.25);">
          <i class="fas fa-ban"></i>
        </div>
        <div>
          <div class="ctx-stat-val" id="ctx-blocked" style="color:var(--green);">—</div>
          <div class="ctx-stat-lbl">IPs bloquées</div>
        </div>
      </div>
    </div>

    <!-- Presets -->
    <div class="bot-ctx-presets">
      <div class="preset-label">Questions rapides</div>
      <button class="preset-btn" onclick="pagePreset('Combien d\'incidents critiques sont ouverts en ce moment ?')">
        <i class="fas fa-fire" style="color:var(--red);"></i>Incidents critiques
      </button>
      <button class="preset-btn" onclick="pagePreset('Quelles anomalies IA ont été détectées ces dernières 24h ?')">
        <i class="fas fa-robot" style="color:var(--purple);"></i>Anomalies IA 24h
      </button>
      <button class="preset-btn" onclick="pagePreset('Y a-t-il des événements post-exploitation récents ?')">
        <i class="fas fa-skull-crossbones" style="color:var(--orange);"></i>Post-exploitation
      </button>
      <button class="preset-btn" onclick="pagePreset('Résume l\'état de sécurité de l\'infrastructure SOC.')">
        <i class="fas fa-chart-pie" style="color:var(--cyan);"></i>Résumé général
      </button>
      <button class="preset-btn" onclick="pagePreset('Quelles IPs sont actuellement bloquées ?')">
        <i class="fas fa-ban" style="color:var(--green);"></i>IPs bloquées
      </button>
      <button class="preset-btn" onclick="pagePreset('Que signifie la technique MITRE T1059 ?')">
        <i class="fas fa-book" style="color:var(--yellow);"></i>MITRE ATT&CK
      </button>
    </div>
  </div>

  <!-- ── ZONE CHAT PRINCIPALE ── -->
  <div class="bot-chat-panel">
    <div class="bot-chat-header">
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="bot-avatar-full">
          <div class="eye eye-l"></div>
          <div class="eye eye-r"></div>
          <div class="mouth"></div>
        </div>
        <div>
          <div style="font-size:0.85rem;font-weight:700;color:var(--text2);font-family:'JetBrains Mono',monospace;">
            SOC Bot <span style="font-size:0.6rem;color:var(--muted);font-weight:400;">gemma2:2b · local</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:3px;">
            <div class="bot-status-dot"></div>
            <span id="page-bot-status" style="font-size:0.65rem;color:var(--green);font-family:'JetBrains Mono',monospace;">En surveillance active</span>
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="clear-btn" onclick="clearPageChat()" title="Effacer la conversation">
          <i class="fas fa-trash-alt"></i>Effacer
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div id="page-bot-messages"></div>

    <!-- Input -->
    <div class="bot-chat-input-area">
      <textarea id="page-bot-input" placeholder="Posez une question à votre SOC Bot…" rows="1"
        onkeydown="pageBotKey(event)" oninput="autoResize(this)"></textarea>
      <button id="page-bot-send" onclick="pageBotSend()" title="Envoyer">
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>
  </div>

</div>

<script>
// ── CONTEXTE SOC ────────────────────────────────────────────────────────────
(async function loadCtx() {
  try {
    const s = await fetch('/api/incidents/stats').then(r => r.json());
    document.getElementById('ctx-open').textContent     = s.open ?? s.total ?? '—';
    document.getElementById('ctx-critical').textContent = s.critical ?? '—';
  } catch(e) {}
  try {
    const d = await fetch('/api/analytics/overview').then(r => r.json());
    document.getElementById('ctx-anomalies').textContent = d.anomalies_24h ?? '—';
    document.getElementById('ctx-pe').textContent        = d.postexploit_24h ?? d.pe_24h ?? '—';
    document.getElementById('ctx-blocked').textContent   = d.blocked_ips ?? '—';
  } catch(e) {}
})();

// ── CHAT ────────────────────────────────────────────────────────────────────
const PAGE_HISTORY_KEY = 'soc_bot_page_history';
let _pageSending = false;

function _now() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function _renderMd(text) {
  return text
    .replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g, '<pre style="background:#111927;border:1px solid #334E6E;border-radius:6px;padding:10px;font-size:0.69rem;overflow-x:auto;margin:8px 0;font-family:monospace;color:#FFD700;white-space:pre-wrap;">$1</pre>')
    .replace(/`([^`]+)`/g, '<code style="background:#111927;padding:1px 6px;border-radius:3px;font-size:0.7rem;color:#FFD700;font-family:monospace;">$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<b style="color:#C8D6EC;">$1</b>')
    .replace(/^• /gm, '<span style="color:var(--green);margin-right:4px;">▸</span>')
    .replace(/\n/g, '<br>');
}

function _appendMsg(type, html, ts) {
  const mc = document.getElementById('page-bot-messages');
  const row = document.createElement('div');
  row.className = `pmsg-row ${type}`;
  const icon = type === 'user' ? '👤' : type === 'alert' ? '🔴' : '🤖';
  row.innerHTML = `
    <div class="pmsg-avatar">${icon}</div>
    <div>
      <div class="pmsg-bubble">${html}</div>
      <div class="pmsg-ts">${ts || _now()}</div>
    </div>`;
  mc.appendChild(row);
  mc.scrollTop = mc.scrollHeight;
  return row;
}

function _appendUserMsg(text) {
  const mc = document.getElementById('page-bot-messages');
  const row = document.createElement('div');
  row.className = 'pmsg-row user';
  row.innerHTML = `
    <div class="pmsg-avatar">👤</div>
    <div>
      <div class="pmsg-bubble">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>
      <div class="pmsg-ts">${_now()}</div>
    </div>`;
  mc.appendChild(row);
  mc.scrollTop = mc.scrollHeight;
}

function _showTyping() {
  const mc = document.getElementById('page-bot-messages');
  const row = document.createElement('div');
  row.className = 'pmsg-row bot'; row.id = 'page-typing';
  row.innerHTML = `<div class="pmsg-avatar">🤖</div><div><div class="pmsg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
  mc.appendChild(row); mc.scrollTop = mc.scrollHeight;
  return row;
}

// Message de bienvenue
(function initChat() {
  const mc = document.getElementById('page-bot-messages');
  if (mc.children.length === 0) {
    _appendMsg('bot', `<b style="color:var(--green);">Bonjour ! Je suis le SOC Bot</b> 👋<br>
Je surveille votre infrastructure en temps réel et peux répondre à vos questions de sécurité.<br>
<span style="color:var(--muted);font-size:0.72rem;">Utilisez les questions rapides à gauche ou posez votre question ci-dessous.</span>`);
  }
})();

window.pageBotSend = async function() {
  if (_pageSending) return;
  const inp  = document.getElementById('page-bot-input');
  const btn  = document.getElementById('page-bot-send');
  const text = (inp.value || '').trim();
  if (!text) return;
  _pageSending = true;
  inp.value = ''; inp.style.height = '';
  btn.disabled = true;

  _appendUserMsg(text);
  const typingRow = _showTyping();

  const mc      = document.getElementById('page-bot-messages');
  const botRow  = document.createElement('div');
  botRow.className = 'pmsg-row bot';
  let fullText  = '';

  try {
    const resp = await fetch('/api/bot/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ message: text })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    typingRow.remove();
    botRow.innerHTML = `<div class="pmsg-avatar">🤖</div><div><div class="pmsg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div><div class="pmsg-ts">${_now()}</div></div>`;
    mc.appendChild(botRow); mc.scrollTop = mc.scrollHeight;
    const bubble = botRow.querySelector('.pmsg-bubble');

    const reader = resp.body.getReader(), decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6);
        if (payload === '[DONE]') break;
        try {
          const d = JSON.parse(payload);
          if (d.token) fullText += d.token;
          else if (d.error) fullText += `\n⚠ ${d.error}`;
          bubble.innerHTML = _renderMd(fullText) || '<span style="opacity:.4">...</span>';
          mc.scrollTop = mc.scrollHeight;
        } catch(_) {}
      }
    }
    if (!fullText) bubble.innerHTML = '<span style="color:var(--muted)">Pas de réponse disponible.</span>';
  } catch(e) {
    typingRow.remove();
    _appendMsg('alert', `<b style="color:var(--red);">Erreur de connexion</b><br>Vérifiez qu'Ollama est lancé.`);
  }
  _pageSending = false;
  btn.disabled = false;
  document.getElementById('page-bot-status').textContent = 'En surveillance active';
  inp.focus();
};

window.pagePreset = function(q) {
  document.getElementById('page-bot-input').value = q;
  pageBotSend();
};

window.pageBotKey = function(e) {
  autoResize(e.target);
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); pageBotSend(); }
};

window.autoResize = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
};

window.clearPageChat = function() {
  document.getElementById('page-bot-messages').innerHTML = '';
  _appendMsg('bot', 'Conversation effacée. Comment puis-je vous aider ?');
};
</script>
{% endblock %}
